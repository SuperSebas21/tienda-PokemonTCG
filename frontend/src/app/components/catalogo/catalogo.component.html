<section class="catalogo-container">
  <h2>Catálogo de Cartas Pokémon</h2>

  <div class="grid-productos">
    <app-producto-card 
      *ngFor="let carta of cartas" 
      [item]="carta"
      (agregar)="agregarAlCarrito($event)">
    </app-producto-card>
  </div>
  
  <div *ngIf="cartas.length === 0" class="mensaje-vacio">
    <p>Cargando cartas desde el servidor o inventario vacío...</p>
  </div>
</section>
